<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — LocalZero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="auth-body">

<div class="auth-left">
    <div class="brand">Local<span>Zero</span></div>
    <div class="hero-text">
        <h2>Welcome back.</h2>
        <p>Sign in to your LocalZero account and continue making a difference in your neighborhood.</p>
    </div>
    <div></div>
</div>

<div class="auth-right">
    <div class="form-card">
        <h1>Sign in</h1>
        <p class="subtitle">No account yet? <a href="/register">Create one here</a></p>

        <div class="alert" id="alert"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@email.com" required />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Your password" required />
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Sign in</button>
        </form>
    </div>
</div>

<script>
    const form  = document.getElementById('loginForm');
    const alert = document.getElementById('alert');
    const btn   = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alert.className = 'alert';

        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        btn.disabled = true;
        btn.textContent = 'Signing in...';

        try {
            const res  = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();

            if (res.ok) {
                alert.className = 'alert success';
                alert.textContent = 'Welcome back! Redirecting...';
                setTimeout(() => window.location.href = '/', 1500);
            } else {
                alert.className = 'alert error';
                alert.textContent = data.error || 'Login failed';
                btn.disabled = false;
                btn.textContent = 'Sign in';
            }
        } catch {
            alert.className = 'alert error';
            alert.textContent = 'Something went wrong. Try again.';
            btn.disabled = false;
            btn.textContent = 'Sign in';
        }
    });
</script>
</body>
</html>
