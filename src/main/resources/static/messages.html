<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inbox — LocalZero</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- NAVBAR  -->
<nav class="navbar">
    <div class="brand">Local<span>Zero</span></div>

    <div class="nav-right">
        <span class="nav-username" id="nav-username">Loading...</span>
        <button class="btn-outline" onclick="logout()">Logout</button>
    </div>
</nav>

<!-- MAIN -->
<div class="layout">

    <!-- LEFT: INBOX LIST -->
    <aside class="sidebar">

        <div class="card">
            <div class="card-title">Inbox</div>

            <div id="inbox-list"></div>
        </div>

    </aside>

    <!-- RIGHT: MESSAGE VIEW -->
    <main>

        <div class="card" id="message-view">

            <div class="empty-state">
                <h3>Select a message</h3>
                <p>Choose a message from your inbox to read it.</p>
            </div>

        </div>

        <!-- SEND MESSAGE -->
        <div class="card" style="margin-top: 1rem;">
            <div class="card-title">New Message</div>

            <div class="form-group">
                <label>To</label>
                <input type="text" id="msg-to" placeholder="Search user by email..." oninput="searchUsers()" />
                <div id="user-results" class="user-results"></div>
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea id="msg-content" placeholder="Write your message..."></textarea>
            </div>

            <button class="btn-primary" onclick="sendMessage()">Send Message</button>
        </div>

    </main>

</div>

<script src="/app.js"></script>
<script src="/messages.js"></script>

</body>
</html>
