<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inbox — LocalZero</title>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- NAVBAR (same as index) -->
<nav class="navbar">
    <div class="brand">Local<span>Zero</span></div>

    <div class="nav-right">
        <span class="nav-username" id="nav-username">Loading...</span>
        <button class="btn-outline" onclick="logout()">Logout</button>
    </div>
</nav>

<!-- MAIN -->
<div class="layout">

    <!-- LEFT: INBOX LIST -->
    <aside class="sidebar">

        <div class="card">
            <div class="card-title">Inbox</div>

            <div id="inbox-list"></div>
        </div>

    </aside>

    <!-- RIGHT: MESSAGE VIEW -->
    <main>

        <div class="card" id="message-view">

            <div class="empty-state">
                <h3>Select a message</h3>
                <p>Choose a message from your inbox to read it.</p>
            </div>

        </div>

        <!-- SEND MESSAGE -->
        <div class="card" style="margin-top: 1rem;">
            <div class="card-title">New Message</div>

            <div class="form-group">
                <label>To (User ID)</label>
                <input type="text" id="msg-to" placeholder="Enter user ID" />
            </div>

            <div class="form-group">
                <label>Message</label>
                <textarea id="msg-content" placeholder="Write your message..."></textarea>
            </div>

            <button class="btn-primary" onclick="sendMessage()">Send Message</button>
        </div>

    </main>

</div>

<script src="/app.js"></script>

<script>
    // Load inbox
    async function loadInbox() {
        const res = await fetch('/api/messages/inbox', {
            credentials: 'include'
        });

        const messages = await res.json();

        const list = document.getElementById('inbox-list');

        if (!messages.length) {
            list.innerHTML = `<p style="font-size:0.85rem;color:#6b7280;">No messages</p>`;
            return;
        }

        list.innerHTML = messages.map(m => `
        <div class="inbox-item" onclick="openMessage(${m.id})">
            <strong>${m.senderId}</strong><br/>
            <span>${m.content.substring(0, 40)}...</span>
        </div>
    `).join('');
    }


    // Open message
    async function openMessage(id) {
        const res = await fetch(`/api/messages/${id}`, {
            credentials: 'include'
        });

        const m = await res.json();

        const view = document.getElementById('message-view');

        view.innerHTML = `
        <div class="card-title">Message</div>

        <p><strong>From:</strong> ${m.senderId}</p>
        <p><strong>Date:</strong> ${new Date(m.timestamp).toLocaleString()}</p>

        <hr style="margin:1rem 0;border:none;border-top:1px solid #eee;" />

        <p style="line-height:1.6;">${m.content}</p>
    `;
    }


    // Send message
    async function sendMessage() {
        const to = document.getElementById('msg-to').value.trim();
        const content = document.getElementById('msg-content').value.trim();

        if (!to || !content) {
            alert('Please fill all fields');
            return;
        }

        await fetch('/api/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                receiverId: to,
                content: content
            })
        });

        document.getElementById('msg-content').value = '';
        loadInbox();
    }

    // Init
    loadInbox();
</script>

</body>
</html>
