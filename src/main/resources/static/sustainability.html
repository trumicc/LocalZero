<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sustainability Tracker</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="navbar">
    <div class="brand">Local<span>Zero</span></div>
    <div class="nav-right">
        <a href="/">Back</a>
    </div>
</nav>

<main class="container">

    <h1>Your Sustainability Tracker</h1>

    <!-- LOG ACTION -->
    <section class="card">
        <h2>Log Eco Action</h2>

        <select id="actionType">
            <option value="BIKE_TO_WORK">Biked to work</option>
            <option value="COMPOSTED">Composted</option>
            <option value="SKIPPED_MEAT">Skipped meat</option>
        </select>

        <input id="note" placeholder="Optional note..." />

        <button onclick="logAction()">Log action</button>
    </section>

    <!-- TOTAL -->
    <section class="card">
        <h2>Your Carbon Savings</h2>
        <p id="total">Loading...</p>
    </section>

    <!-- HISTORY -->
    <section class="card">
        <h2>Your Actions</h2>
        <div id="actions"></div>
    </section>

</main>

<script src="/app.js"></script>
</body>
</html>
